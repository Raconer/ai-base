spring:
  application:
    name: ai-base

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:aibase}
    username: ${DB_USERNAME:aibase}
    password: ${DB_PASSWORD:aibase1234}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_batch_fetch_size: 100
    open-in-view: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

# JWT
jwt:
  secret: ${JWT_SECRET:ai-base-jwt-secret-key-must-be-at-least-512-bits-long-for-hs512-algorithm}
  access-expiration: 1800000    # 30분
  refresh-expiration: 604800000 # 7일

# Swagger
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html
    tags-sorter: alpha
    operations-sorter: alpha

# Anthropic AI
anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
  model: claude-haiku-4-5-20251001
  max-tokens: 2048

# Logging
logging:
  level:
    com.aibase: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
