version: '3.9'

services:

  postgres:
    image: pgvector/pgvector:pg16
    container_name: aibase-postgres
    environment:
      POSTGRES_DB: aibase
      POSTGRES_USER: aibase
      POSTGRES_PASSWORD: aibase1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aibase -d aibase"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aibase-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: aibase-backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: aibase
      DB_USERNAME: aibase
      DB_PASSWORD: aibase1234
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ai-base-jwt-secret-key-must-be-at-least-512-bits-long-for-hs512-algorithm
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: aibase-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
