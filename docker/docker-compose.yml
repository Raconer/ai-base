name: ai_base

services:

  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai_base-postgres
    environment:
      POSTGRES_DB: aibase
      POSTGRES_USER: aibase
      POSTGRES_PASSWORD: aibase1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aibase -d aibase"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
